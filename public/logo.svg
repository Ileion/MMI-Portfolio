<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="32" fill="url(#logoGradient)" opacity="0.9"/>

  <!-- Inner circle for depth -->
  <circle cx="32" cy="32" r="28" fill="url(#logoGradient)" opacity="1"/>

  <!-- MMI Text -->
  <text x="32" y="42" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">MMI</text>

  <!-- Decorative accent line -->
  <line x1="12" y1="32" x2="22" y2="32" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="42" y1="32" x2="52" y2="32" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
</svg>

